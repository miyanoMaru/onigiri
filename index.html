<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おにぎり処方箋 🍙</title>
<meta name="description" content="気分・味・栄養を選ぶだけで、220種からぴったりのおにぎりレシピを調合。サプリやゲテモノ入りの「攻めレシピ」の混入も選べます。">

<meta property="og:url" content="https://miyanomaru.github.io/onigiri/">
<meta property="og:title" content="おにぎり処方箋 🍙">
<meta property="og:description" content="気分・味・栄養を選ぶだけで、220種からぴったりのおにぎりレシピを調合。サプリやゲテモノ入りの「攻めレシピ」の混入も選べます。">

<meta property="og:site_name" content="おにぎり処方箋">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="おにぎり処方箋 🍙">
<meta name="twitter:description" content="気分・味・栄養を選ぶだけで、220種からぴったりのおにぎりレシピを調合。攻めレシピの混入も選べます。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rice: #FAF5EA;
    --rice-deep: #F1E9D6;
    --nori: #262D22;
    --nori-soft: #3C4536;
    --ume: #D9455F;
    --shake: #EF8A5F;
    --shiso: #5F7F52;
    --tamago: #EFB63C;
    --ink-sub: #6E7365;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--rice);
    color: var(--nori);
    min-height: 100vh;
    background-image: radial-gradient(var(--rice-deep) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 80px; }

  /* ===== ヘッダー ===== */
  header { text-align: center; margin-bottom: 26px; }
  .kanban {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--nori); color: var(--rice);
    padding: 12px 26px; border-radius: 999px;
    box-shadow: 0 4px 0 rgba(38,45,34,.25);
  }
  .kanban h1 { font-size: 1.45rem; font-weight: 900; letter-spacing: .08em; }
  .kanban .oni { font-size: 1.6rem; animation: sway 3s ease-in-out infinite; display:inline-block; }
  @keyframes sway { 0%,100%{ transform: rotate(-6deg);} 50%{ transform: rotate(6deg);} }
  header p { margin-top: 12px; color: var(--ink-sub); font-size: .92rem; font-weight: 700; }

  /* ===== 問診カード ===== */
  .card {
    background: #fff; border: 2px solid var(--nori);
    border-radius: var(--radius); padding: 20px; margin-bottom: 18px;
    box-shadow: 5px 5px 0 rgba(38,45,34,.12);
  }
  .q-label { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .q-label .badge {
    background: var(--ume); color: #fff; font-weight: 900;
    border-radius: 8px; padding: 2px 10px; font-size: .8rem; flex-shrink: 0;
  }
  .q-label h2 { font-size: 1.05rem; font-weight: 900; }
  .opts { display: flex; flex-wrap: wrap; gap: 9px; }
  .opt {
    border: 2px solid var(--nori-soft); background: var(--rice);
    border-radius: 999px; padding: 9px 16px;
    font-family: inherit; font-weight: 700; font-size: .92rem; color: var(--nori);
    cursor: pointer; transition: transform .12s, background .12s, color .12s;
  }
  .opt:hover { transform: translateY(-2px); }
  .opt:focus-visible { outline: 3px solid var(--tamago); outline-offset: 2px; }
  .opt.on { background: var(--nori); color: var(--rice); border-color: var(--nori); }

  /* ===== 面白レシピトグル ===== */
  .joke-card { border-style: dashed; }
  .joke-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .joke-row .txt h2 { font-size: 1.05rem; font-weight: 900; }
  .joke-row .txt p { color: var(--ink-sub); font-size: .84rem; margin-top: 4px; font-weight: 700; }
  .switch { display: flex; border: 2px solid var(--nori); border-radius: 999px; overflow: hidden; }
  .switch button {
    font-family: inherit; font-weight: 900; font-size: .88rem;
    padding: 9px 16px; border: none; background: #fff; color: var(--nori); cursor: pointer;
  }
  .switch button.on { background: var(--tamago); }
  .switch button:focus-visible { outline: 3px solid var(--ume); outline-offset: -3px; }

  /* ===== にぎるボタン ===== */
  .nigiru {
    display: block; width: 100%; margin-top: 6px;
    background: var(--ume); color: #fff; border: 2px solid var(--nori);
    border-radius: var(--radius); padding: 16px;
    font-family: inherit; font-size: 1.15rem; font-weight: 900; letter-spacing: .1em;
    cursor: pointer; box-shadow: 5px 5px 0 rgba(38,45,34,.2);
    transition: transform .12s, box-shadow .12s;
  }
  .nigiru:hover { transform: translate(2px,2px); box-shadow: 3px 3px 0 rgba(38,45,34,.2); }
  .nigiru:active { transform: translate(5px,5px); box-shadow: none; }
  .nigiru:focus-visible { outline: 3px solid var(--tamago); outline-offset: 3px; }
  .nigiru:disabled { background: #C9C3B4; cursor: not-allowed; }

  /* ===== 結果 ===== */
  #result { margin-top: 34px; }
  .result-head { text-align: center; margin-bottom: 18px; }
  .result-head h2 {
    display: inline-block; font-size: 1.2rem; font-weight: 900;
    border-bottom: 4px solid var(--tamago); padding-bottom: 4px;
  }
  .recipe {
    background: #fff; border: 2px solid var(--nori); border-radius: var(--radius);
    padding: 22px; margin-bottom: 16px; box-shadow: 5px 5px 0 rgba(38,45,34,.12);
    display: grid; grid-template-columns: 120px 1fr; gap: 18px; align-items: start;
    animation: pop .35s ease both;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(14px) scale(.97);} to { opacity: 1; transform: none;} }
  .recipe:nth-child(2){ animation-delay:.08s } .recipe:nth-child(3){ animation-delay:.16s } .recipe:nth-child(4){ animation-delay:.24s }
  .recipe.joke { border-color: var(--ume); border-style: dashed; background: #FFF4F0; }
  .oni-svg { width: 120px; height: 120px; }
  .r-body h3 { font-size: 1.15rem; font-weight: 900; margin-bottom: 2px; }
  .r-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
  .tag {
    font-size: .72rem; font-weight: 900; padding: 3px 9px; border-radius: 999px;
    background: var(--rice-deep); color: var(--nori-soft);
  }
  .tag.warn { background: var(--ume); color: #fff; }
  .r-body .desc { font-size: .9rem; line-height: 1.7; }
  .r-body .ing { margin-top: 10px; font-size: .86rem; background: var(--rice); border-radius: 10px; padding: 10px 12px; }
  .r-body .ing strong { font-size: .78rem; color: var(--ink-sub); display: block; margin-bottom: 3px; }
  .r-body .howto { margin-top: 8px; font-size: .86rem; color: var(--nori-soft); line-height: 1.7; }
  .caution { margin-top: 8px; font-size: .78rem; color: var(--ume); font-weight: 700; }
  .again {
    display: block; width: 100%; margin: 10px 0 20px;
    background: var(--shiso); color: #fff; border: 2px solid var(--nori);
    border-radius: var(--radius); padding: 15px;
    font-family: inherit; font-size: 1.1rem; font-weight: 900; letter-spacing: .08em;
    cursor: pointer; box-shadow: 5px 5px 0 rgba(38,45,34,.2);
    transition: transform .12s, box-shadow .12s;
  }
  .again:hover { transform: translate(2px,2px); box-shadow: 3px 3px 0 rgba(38,45,34,.2); }
  .again:active { transform: translate(5px,5px); box-shadow: none; }
  .again:focus-visible { outline: 3px solid var(--tamago); outline-offset: 3px; }
  .empty { text-align: center; color: var(--ink-sub); font-weight: 700; padding: 20px; }

  /* ===== シェア ===== */
  .r-share { margin-top: 12px; }
  .share-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-weight: 900; font-size: .8rem;
    background: #fff; color: var(--nori); border: 2px solid var(--nori);
    border-radius: 999px; padding: 6px 14px; cursor: pointer; margin-right: 8px;
    transition: transform .12s;
  }
  .share-btn:hover { transform: translateY(-2px); }
  .share-btn:focus-visible { outline: 3px solid var(--tamago); outline-offset: 2px; }
  .share-btn.x { background: var(--nori); color: var(--rice); }
  .share-bar {
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 18px;
  }
  .share-bar .share-btn { font-size: .92rem; padding: 10px 20px; box-shadow: 3px 3px 0 rgba(38,45,34,.15); margin-right: 0; }
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--nori); color: var(--rice); font-weight: 900; font-size: .88rem;
    padding: 12px 22px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 520px) {
    .recipe { grid-template-columns: 1fr; }
    .oni-svg { margin: 0 auto; display: block; }
  }
  @media (prefers-reduced-motion: reduce) {
    .kanban .oni, .recipe { animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kanban"><span class="oni">🍙</span><h1>おにぎり処方箋</h1></div>
    <p>今日の気分を教えてください。ぴったりの一品をおにぎり薬局が調合します。</p>
  </header>

  <section class="card">
    <div class="q-label"><span class="badge">問1</span><h2>今日の気分は?</h2></div>
    <div class="opts" id="q-mood" role="group" aria-label="今日の気分"></div>
  </section>

  <section class="card">
    <div class="q-label"><span class="badge">問2</span><h2>食べたい味は?</h2></div>
    <div class="opts" id="q-taste" role="group" aria-label="食べたい味"></div>
  </section>

  <section class="card">
    <div class="q-label"><span class="badge">問3</span><h2>欲しい栄養は?</h2></div>
    <div class="opts" id="q-nutri" role="group" aria-label="欲しい栄養"></div>
  </section>

  <section class="card joke-card">
    <div class="joke-row">
      <div class="txt">
        <h2>🧪 面白レシピの混入</h2>
        <p>サプリ・ゲテモノ入りの「攻めレシピ」を処方に混ぜますか?</p>
      </div>
      <div class="switch" role="group" aria-label="面白レシピの混入">
        <button id="joke-on" class="on" aria-pressed="true">混ぜてOK</button>
        <button id="joke-off" aria-pressed="false">まじめ一択</button>
      </div>
    </div>
  </section>

  <button class="nigiru" id="go">にぎる 🍙</button>

  <section id="result" aria-live="polite"></section>
</div>
<div id="toast" role="status"></div>

<script>

  {id:"gattsuri",label:"がっつりいきたい"},
  {id:"bouken", label:"冒険したい"},
];
const TASTES = [
  {id:"shio",   label:"しょっぱい系"},
  {id:"umami",  label:"うまみ・だし系"},
  {id:"karai",  label:"ピリ辛"},
  {id:"suppai", label:"酸味"},
  {id:"kotteri",label:"こってり"},
];
const NUTRIS = [

  {id:"energy", label:"エネルギー補給"},
  {id:"free",   label:"特にこだわらない"},
];

// ===== レシピDB =====
// mood/taste/nutri: マッチするIDの配列 / joke: 面白レシピか / color: 具の色
const RECIPES = [
  // ---- まじめ ----
  {name:"鮭マヨ黒ごまむすび", joke:false, color:"#EF8A5F",

   how:"鮭とマヨ・ごまを和えて具に。塩をつけた手でふんわりにぎり、海苔を巻く。"},
  {name:"梅しそ疲労回復むすび", joke:false, color:"#D9455F",

   how:"叩いた梅と大葉・ごまをごはんに混ぜ込んでにぎる。冷めてもおいしい。"},
  {name:"枝豆塩昆布チーズむすび", joke:false, color:"#5F7F52",
   mood:["genki","tsukare"], taste:["umami","shio"], nutri:["protein","fiber"],
   desc:"枝豆のタンパク質と塩昆布のうまみ、角切りチーズのコクが三位一体。彩りもかわいい万能選手。",

  {name:"明太クリチのこってりむすび", joke:false, color:"#E76A8A",

  {name:"玄米おかかごぼうむすび", joke:false, color:"#8A6B3F",

   ing:"炊いた玄米、きんぴらごぼう、かつお節、しょうゆ少々",

  {name:"鶏そぼろ生姜むすび", joke:false, color:"#C97B3D",

   desc:"甘辛そぼろに生姜をきかせて、体の中からぽかぽか。冷えた日やがんばりたい朝に。",

  {name:"悪魔の天かす青のりむすび", joke:false, color:"#EFB63C",

  {name:"しらすごま塩カルシウムむすび", joke:false, color:"#B9C4CC",

   desc:"しらすとごまでカルシウムとミネラルを手軽に。やさしい塩気でいくらでも食べられる。",

   how:"しらすとごまを混ぜ込み、塩でにぎる。大葉で巻くと風味アップ。"},
  {name:"焼き味噌ねぎむすび", joke:false, color:"#A5652F",

  {name:"焼きとうもろこしバター醤油むすび", joke:false, color:"#EFD03C",

  {name:"ひじき煮の栄養貯金むすび", joke:false, color:"#4A4238",

// ===== 状態 =====
const state = { mood:null, taste:null, nutri:null, joke:true };
let lastPool = null;

function renderOpts(elId, items, key){
  const el = document.getElementById(elId);
  items.forEach(it=>{
    const b = document.createElement("button");
    b.className = "opt"; b.textContent = it.label; b.type = "button";
    b.setAttribute("aria-pressed","false");
    b.onclick = ()=>{
      state[key] = it.id;
      [...el.children].forEach(c=>{ c.classList.remove("on"); c.setAttribute("aria-pressed","false"); });
      b.classList.add("on"); b.setAttribute("aria-pressed","true");
    };
    el.appendChild(b);
  });
}
renderOpts("q-mood", MOODS, "mood");
renderOpts("q-taste", TASTES, "taste");
renderOpts("q-nutri", NUTRIS, "nutri");

const jOn = document.getElementById("joke-on"), jOff = document.getElementById("joke-off");
jOn.onclick = ()=>{ state.joke = true; jOn.classList.add("on"); jOff.classList.remove("on"); jOn.setAttribute("aria-pressed","true"); jOff.setAttribute("aria-pressed","false"); };
jOff.onclick = ()=>{ state.joke = false; jOff.classList.add("on"); jOn.classList.remove("on"); jOff.setAttribute("aria-pressed","true"); jOn.setAttribute("aria-pressed","false"); };

// ===== マッチング =====
function score(r){
  let s = 0;
  if (state.mood  && r.mood.includes(state.mood))   s += 3;
  if (state.taste && r.taste.includes(state.taste)) s += 3;
  if (state.nutri === "free") s += 1;
  else if (state.nutri && r.nutri.includes(state.nutri)) s += 2;
  return s;
}

function candidates(list, minPool = 6){
  const scored = list.map(r=>({r, s: score(r)}));
  const max = Math.max(...scored.map(c=>c.s));
  // 最高点から-3点までを抽選候補にする(条件未選択などで最高点が0なら全員候補)
  let floor = max > 0 ? Math.max(max - 3, 1) : 0;
  let band = scored.filter(c=> c.s >= floor);
  // 候補が少なすぎる場合は帯を広げて、引き直しの多様性を確保する
  while (band.length < minPool && floor > 0){
    floor--;
    band = scored.filter(c=> c.s >= floor);
  }
  return band.map(c=>({r: c.r, s: c.s, w: Math.pow(1.7, c.s)}));
}

// スコアの重みに応じて、重複なしでk件抽選する
function weightedSample(cands, k){
  const pool = cands.slice();
  const picked = [];
  while (picked.length < k && pool.length){
    const total = pool.reduce((sum,c)=> sum + c.w, 0);
    let roll = Math.random() * total;
    let idx = pool.length - 1;
    for (let i = 0; i < pool.length; i++){
      roll -= pool[i].w;
      if (roll <= 0){ idx = i; break; }
    }
    picked.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return picked;
}

function pickRecipes(){
  const seriousPicks = weightedSample(candidates(RECIPES.filter(r=>!r.joke)), state.joke ? 2 : 3);
  seriousPicks.sort((a,b)=> b.s - a.s); // 「本日の処方」タグは高スコア側に
  const picks = seriousPicks.map(c=>c.r);
  if (state.joke){
    const j = weightedSample(candidates(RECIPES.filter(r=>r.joke)), 1);
    if (j.length) picks.push(j[0].r);
  }
  return picks;
}

// ===== おにぎりSVG =====
function oniSvg(color, joke){
  const face = joke
    ? `<text x="60" y="66" font-size="16" text-anchor="middle">✕ ✕</text>
       <path d="M52 78 q8 -7 16 0" stroke="#262D22" stroke-width="3" fill="none" stroke-linecap="round"/>`
    : `<circle cx="48" cy="60" r="3.4" fill="#262D22"/><circle cx="72" cy="60" r="3.4" fill="#262D22"/>
       <path d="M52 72 q8 7 16 0" stroke="#262D22" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  return `<svg class="oni-svg" viewBox="0 0 120 120" role="img" aria-label="おにぎりのイラスト">
    <path d="M60 12 C68 12 72 18 80 30 L102 66 C108 76 104 88 92 90 C72 94 48 94 28 90 C16 88 12 76 18 66 L40 30 C48 18 52 12 60 12 Z"
      fill="#FDFBF4" stroke="#262D22" stroke-width="4"/>
    <ellipse cx="60" cy="42" rx="13" ry="9" fill="${color}"/>
    <rect x="42" y="86" width="36" height="22" rx="4" fill="#262D22"/>
    ${face}
    ${joke ? `<text x="96" y="30" font-size="18">💦</text>` : `<text x="94" y="28" font-size="16">✨</text>`}
  </svg>`;
}

// ===== 結果描画 =====
const NUTRI_LABEL = Object.fromEntries(NUTRIS.map(n=>[n.id,n.label]));
const MOOD_LABEL  = Object.fromEntries(MOODS.map(m=>[m.id,m.label]));
const TASTE_LABEL = Object.fromEntries(TASTES.map(t=>[t.id,t.label]));
let currentPicks = [];

function conditionText(){
  const parts = [];
  if (state.mood)  parts.push(`気分「${MOOD_LABEL[state.mood]}」`);
  if (state.taste) parts.push(`味「${TASTE_LABEL[state.taste]}」`);
  if (state.nutri) parts.push(`栄養「${NUTRI_LABEL[state.nutri]}」`);
  return parts.join(" × ");
}

const APP_URL = "https://miyanomaru.github.io/onigiri/";

function buildShareText(recipe){
  const cond = conditionText();
  if (recipe){
    return `🍙おにぎり処方箋🍙\n${cond ? cond + " の私に処方されたのは…\n" : ""}${recipe.joke ? "⚠攻めレシピ " : ""}「${recipe.name}」\n${recipe.desc}\n#おにぎり処方箋\n${APP_URL}`;
  }
  const lines = currentPicks.map((r,i)=> `${["①","②","③"][i]||"・"}${r.joke?"⚠":""}${r.name}`).join("\n");
  return `🍙おにぎり処方箋🍙\n${cond ? cond + " の私への処方は…\n" : "本日の処方は…\n"}${lines}\n#おにぎり処方箋\n${APP_URL}`;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove("show"), 2200);
}

async function doShare(text){
  if (navigator.share){
    try { await navigator.share({ text }); return; }
    catch(e){ if (e.name === "AbortError") return; }
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast("📋 シェア文をコピーしました!");
  } catch(e){
    // クリップボードも使えない環境向けの最終手段
    window.prompt("以下をコピーしてシェアしてください", text);
  }
}

function shareToX(text){
  const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
  window.open(url, "_blank", "noopener");
}

function render(picks){
  currentPicks = picks;
  const box = document.getElementById("result");
  if (!picks.length){
    box.innerHTML = `<p class="empty">条件に合うおにぎりが見つかりませんでした…条件を変えてもう一度どうぞ。</p>`;
    return;
  }
  const cards = picks.map((r,i)=>{
    const tags = [
      i===0 ? `<span class="tag" style="background:var(--tamago);color:#262D22">本日の処方</span>` : "",
      r.joke ? `<span class="tag warn">⚠ 攻めレシピ</span>` : "",
      ...r.nutri.filter(n=>n!=="free").map(n=>`<span class="tag">${NUTRI_LABEL[n]||n}</span>`)
    ].join("");
    return `<article class="recipe ${r.joke?"joke":""}">
      ${oniSvg(r.color, r.joke)}
      <div class="r-body">
        <h3>${r.name}</h3>
        <div class="r-tags">${tags}</div>
        <p class="desc">${r.desc}</p>
        <div class="ing"><strong>材料</strong>${r.ing}</div>
        <p class="howto">🍙 ${r.how}</p>
        ${r.caution ? `<p class="caution">⚠ ${r.caution}</p>` : ""}
        <div class="r-share">
          <button class="share-btn" data-share="${i}">📤 このレシピをシェア</button>
          <button class="share-btn x" data-x="${i}">𝕏 ポスト</button>
        </div>
      </div>
    </article>`;
  }).join("");
  box.innerHTML = `<div class="result-head"><h2>本日の処方箋</h2></div>${cards}
    <button class="again" id="again">🎲 もう一回にぎる</button>
    <div class="share-bar">
      <button class="share-btn" id="share-all">📤 処方箋まるごとシェア</button>
      <button class="share-btn x" id="share-all-x">𝕏 結果をポスト</button>
    </div>`;
  document.getElementById("again").onclick = ()=> render(pickRecipes());
  document.getElementById("share-all").onclick = ()=> doShare(buildShareText(null));
  document.getElementById("share-all-x").onclick = ()=> shareToX(buildShareText(null));
  box.querySelectorAll("[data-share]").forEach(b=>{
    b.onclick = ()=> doShare(buildShareText(picks[+b.dataset.share]));
  });
  box.querySelectorAll("[data-x]").forEach(b=>{
    b.onclick = ()=> shareToX(buildShareText(picks[+b.dataset.x]));
  });
  box.scrollIntoView({behavior:"smooth", block:"start"});
}

document.getElementById("go").onclick = ()=>{
  if (!state.mood && !state.taste && !state.nutri){
    alert("どれかひとつでいいので、気分・味・栄養を選んでください🍙");
    return;
  }
  render(pickRecipes());
};
